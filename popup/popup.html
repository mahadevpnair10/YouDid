<!DOCTYPE html>
<html>
<head>
  <title>Apriori Results</title>

  <div class="controls">
    <label>Min Support:</label>
    <input type="number" id="minSupport" value="0.2" step="0.05" min="0" max="1">

    <button id="runBtn">Run Apriori</button>

  <h3>Frequent Itemsets</h3>

  <h3>Association Rules</h3>
  <div id="rules"></div>

</body>
</html>
